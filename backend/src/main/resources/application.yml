server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/movieapp}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://dev-zqcjr4qhwr7u37s1.us.auth0.com/}

auth0:
  audience: ${AUTH0_AUDIENCE:https://movie-app-api}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

tmdb:
  api:
    key: ${TMDB_API_KEY:}
    base-url: https://api.themoviedb.org/3

management:
  endpoints:
    web:
      exposure:
        include: health,info